name: Create Release from PR Descriptions

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Generate release notes from PR descriptions
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            const { owner, repo } = context.repo;

            const tags = await github.rest.repos.listTags({
              owner,
              repo,
              per_page: 100
            });

            const currentIndex = tags.data.findIndex(t => t.name === tag);
            const previousTag = tags.data[currentIndex + 1]?.name;

            let prs = [];

            if (previousTag) {
              const comparison = await github.rest.repos.compareCommits({
                owner,
                repo,
                base: previousTag,
                head: tag
              });

              const commits = comparison.data.commits;

              for (const commit of commits) {
                const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: commit.sha
                });

                for (const pr of result.data) {
                  if (
                    pr.merged_at &&
                    !prs.find(existing => existing.number === pr.number)
                  ) {
                    prs.push(pr);
                  }
                }
              }
            }

            const categories = {
              Added: [],
              Changed: [],
              Fixed: [],
              Removed: []
            };

            function extractReleaseNotes(body) {
              if (!body) return "";

              const match = body.match(
                /## Release Notes([\s\S]*?)(## Technical Details|## Checklist|$)/i
              );

              return match ? match[1].trim() : "";
            }

            function extractCategoryItems(notes, category) {
              const regex = new RegExp(
                `### ${category}\\s*([\\s\\S]*?)(### Added|### Changed|### Fixed|### Removed|$)`,
                "i"
              );

              const match = notes.match(regex);

              if (!match) return [];

              return match[1]
                .split("\n")
                .map(line => line.trim())
                .filter(line => line.startsWith("-"))
                .map(line => line.replace(/^-+\s*/, "").trim())
                .filter(line => line.length > 0);
            }

            for (const pr of prs) {
              const notes = extractReleaseNotes(pr.body);

              if (!notes) continue;

              for (const category of Object.keys(categories)) {
                const items = extractCategoryItems(notes, category);

                for (const item of items) {
                  categories[category].push(`- ${item} (PR#${pr.number} by @${pr.user.login})`);
                }
              }
            }

            let releaseBody = `Release ${tag}\n`;

            if (previousTag) {
              releaseBody += `Vergleich: ${previousTag}...${tag}\n\n`;
            } else {
              releaseBody += `Vergleich: Erstes Release\n\n`;
            }

            for (const category of Object.keys(categories)) {
              releaseBody += `## ${category}\n`;

              if (categories[category].length > 0) {
                releaseBody += categories[category].join("\n") + "\n\n";
              } else {
                releaseBody += "- \n\n";
              }
            }

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: releaseBody,
              draft: false,
              prerelease: false
            });
